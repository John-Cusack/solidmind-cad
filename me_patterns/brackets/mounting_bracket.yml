name: Mounting Bracket
description: >
  A flat or bent plate used to mount components to walls, panels, or frames.
  Commonly found in electronics enclosures, HVAC equipment, and structural assemblies.

design_considerations:
  - Load path: fastener holes must be positioned to distribute load evenly
  - Bending relief: add fillets at bend transitions to prevent stress concentration
  - Fastener clearance: ensure sufficient edge distance (min 2x hole diameter from edge)
  - Stiffness: add flanges or gussets for thin brackets under bending loads
  - Access: ensure tool clearance for assembly (wrench/screwdriver access)

feature_sequence:
  - step: 1
    operation: sketch + pad
    description: Base plate — rectangular profile on XY plane, pad to material thickness
    notes: Typical thickness 2-6 mm (sheet metal) or 6-15 mm (machined)

  - step: 2
    operation: sketch + pad
    description: Vertical flange — if L-shaped, sketch on edge face and pad outward
    notes: Flange height depends on mounting surface offset

  - step: 3
    operation: hole
    description: Mounting holes — through-holes for fasteners on base plate
    notes: Use cad.hole on top face; typical M3-M8 clearance holes

  - step: 4
    operation: hole
    description: Component attachment holes — on flange or base depending on orientation
    notes: May need counterbores for socket head cap screws

  - step: 5
    operation: fillet
    description: Bend radius at flange junction
    notes: CNC min radius = tool radius; sheet metal min = material thickness

  - step: 6
    operation: fillet or chamfer
    description: Edge breaks on outer edges for deburring
    notes: 0.5-1 mm chamfer or fillet typical

typical_dimensions:
  thickness_mm: [2, 3, 4, 5, 6, 8, 10]
  width_mm: [20, 120]
  length_mm: [30, 200]
  hole_sizes_mm: [3.2, 4.2, 5.3, 6.4, 8.4]

manufacturing_notes:
  cnc:
    - Single setup possible for flat brackets; two setups for L-brackets
    - Minimum internal corner radius equals end mill radius (typically 1-3 mm)
    - Counterbore depth should leave min 2 mm floor thickness
  fdm:
    - Print flat side down for best accuracy on mounting surfaces
    - Holes < 8 mm print well without supports; larger holes may need orientation change
    - Add 0.2-0.3 mm clearance to hole diameters for press-fit tolerance
    - Bridge distance over holes limited to ~10 mm without supports
