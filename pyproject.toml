[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "solidmind-cad"
version = "0.2.0"
description = "FreeCAD-integrated CAD co-pilot driven by MCP — PartDesign workbench + manufacturing readiness"
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }
dependencies = [
  "lancedb>=0.15,<1",
  "sentence-transformers>=3.0,<4",
  "docling>=2.0,<3",
  "jsonschema>=4.10,<5",
  "orjson>=3.9,<4",
  "PyYAML>=6.0,<7",
]

[project.optional-dependencies]
gpu = ["onnxruntime-gpu"]
schemas = ["pydantic>=2.6,<3"]

[project.scripts]
solidmind-cad = "server.main:main"

[tool.setuptools]
packages = ["server", "freecad_addon"]
