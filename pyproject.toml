[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "solidmind-cad"
version = "0.2.0"
description = "FreeCAD-integrated CAD co-pilot driven by MCP — PartDesign workbench + manufacturing readiness"
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }
dependencies = [
  "httpx>=0.27,<1",
  "jsonschema>=4.10,<5",
  "orjson>=3.9,<4",
  "PyYAML>=6.0,<7",
]

[project.optional-dependencies]
# Only needed if you want generated JSON Schemas from Pydantic v2 tool models.
schemas = ["pydantic>=2.6,<3"]

[project.scripts]
solidmind-cad = "server.main:main"

[tool.setuptools]
packages = ["server", "freecad_addon"]
