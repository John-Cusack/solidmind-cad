name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unittest:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # Install only the deps the test suite actually imports — the Rust
        # extension (`solidmind_geometry`, built via maturin) is not required
        # for most tests and needs a Rust toolchain, so we skip
        # `pip install -e .` here to keep CI lean. Tests that need optional
        # extensions (CHOLMOD, cuDSS, FreeCAD, Isaac, Gazebo) skip cleanly.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "jsonschema>=4.10,<5" \
            "orjson>=3.9,<4" \
            "PyYAML>=6.0,<7" \
            "pydantic>=2.6,<3" \
            "numpy>=1.26,<3" \
            "scipy>=1.11,<2"

      - name: Run unit tests
        run: python -m unittest --verbose

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    # Non-blocking for now — the codebase hasn't been linted yet and we
    # want visibility into violations before we make them enforcing.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: python -m pip install "ruff>=0.6,<1"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .
