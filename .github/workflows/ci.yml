name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unittest:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: geometry

      - name: Set up venv + test dependencies
        # A venv is required by `maturin develop` (below). We install only the
        # deps the test suite imports — heavier optional extensions (CHOLMOD,
        # cuDSS, FreeCAD, Isaac, Gazebo) are omitted; tests needing them skip.
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip "maturin>=1.7,<2"
          .venv/bin/pip install \
            "jsonschema>=4.10,<5" \
            "orjson>=3.9,<4" \
            "PyYAML>=6.0,<7" \
            "pydantic>=2.6,<3" \
            "numpy>=1.26,<3" \
            "scipy>=1.11,<2"

      - name: Build Rust geometry kernel (solidmind_geometry)
        # `import solidmind_geometry` is a hard requirement for the geometry /
        # propeller test modules — without it they error at collection. Build
        # and install the pyo3 extension so those tests run instead of failing.
        run: .venv/bin/maturin develop --manifest-path geometry/Cargo.toml

      - name: Run unit tests
        run: .venv/bin/python -m unittest --verbose

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    # Enforcing: the codebase is clean (ruff check + ruff format both pass).
    # This gate now blocks regressions.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: python -m pip install "ruff>=0.6,<1"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .
