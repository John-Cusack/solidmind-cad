name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow or friction point that motivates this request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a specific idea, sketch it out. Otherwise describe the desired outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you set them aside.
  - type: dropdown
    id: area
    attributes:
      label: Tool group
      description: Which part of SolidMind CAD does this touch?
      options:
        - cad.* (PartDesign, sketches, measurement)
        - design.* (phased assembly pipeline)
        - motion.* (kinematic / dynamic validation)
        - analysis.* (FEA / CFD)
        - geometry.* (parametric generators)
        - knowledge.* (search, ingestion)
        - server / MCP bridge
        - FreeCAD addon
        - docs / developer experience
        - other
