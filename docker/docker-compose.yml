# OpenRAG stack for SolidMind CAD knowledge backend.
# Usage: docker compose -f docker/docker-compose.yml up -d
#
# Provides: OpenSearch (vector DB), OpenRAG backend, Langflow (orchestration),
# Docling (PDF/doc processing). Frontend is omitted — API-only use.

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: solidmind-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  docling-serve:
    image: ds4sd/docling-serve:latest
    container_name: solidmind-docling
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langflow:
    image: langflowai/langflow:latest
    container_name: solidmind-langflow
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:///./langflow.db
    ports:
      - "7860:7860"
    volumes:
      - langflow-data:/app/langflow
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  openrag:
    image: langflowai/openrag:latest
    container_name: solidmind-openrag
    env_file:
      - .env
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - DOCLING_URL=http://docling-serve:5001
      - LANGFLOW_URL=http://langflow:7860
    ports:
      - "${OPENRAG_PORT:-8080}:8080"
    depends_on:
      opensearch:
        condition: service_healthy
      docling-serve:
        condition: service_healthy
      langflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  opensearch-data:
  langflow-data:
