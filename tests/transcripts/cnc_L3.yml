spec_draft:
  meta:
    spec_version: "1.0.0"
    created_at: "2026-02-10T00:00:00Z"
    process: "cnc"
    maturity_level: "L3"
    units: "mm"
  part:
    name: ""
    description: ""
    quantity: 1
    envelope: { x: 0, y: 0, z: 0 }
    interfaces: []
    critical_features: []
  manufacturing:
    process_notes: ""
    material: { family: "", grade: "" }
    tolerances: { general: "", critical: [] }
    surface_finish: { ra_um: null, coating: "none" }
    cosmetics: { visible_surfaces: "" }
  inspection: { ctq: [], method: "", requirements: [] }
  deliverables: { cad_formats: [], drawing_required: false }
  open_questions: []
  assumptions: []
  _interview: { answered: {}, skipped: {}, _counter: 0 }
  _audit: []

steps:
  - tool: spec.next_question
    expect_subset:
      question_id: envelope

  - tool: spec.apply_answer
    params:
      op: set
      path: /part/envelope
      value: { x: 150, y: 80, z: 25 }
      question_id: envelope
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /manufacturing/material
      value: { family: "stainless_steel", grade: "316" }
      question_id: material_grade
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /part/interfaces
      value:
        - "Datums: A=bottom face, B=rear face, C=left face"
        - "2x dowel holes: 6H7, positional to A|B|C"
      question_id: interfaces
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /deliverables/cad_formats
      value: ["STEP"]
      question_id: cad_formats
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /deliverables/drawing_required
      value: true
      question_id: drawing_required
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /manufacturing/tolerances/general
      value: "ISO 2768-m"
      question_id: tolerance_general
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /manufacturing/surface_finish
      value: { ra_um: 1.6, coating: "none" }
      question_id: surface_finish
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /inspection/method
      value: "CMM"
      question_id: inspection_method
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /part/quantity
      value: 250
      question_id: quantity
      source: user

  - tool: spec.apply_answer
    params:
      op: set
      path: /part/description
      value: "Production CNC part with explicit tolerance scheme, finish, and inspection method."
      question_id: part_description
      source: user

  - tool: spec.validate
    expect_subset:
      shape_valid: true
      blockers: []
      coverage_threshold: 0.9

  - tool: spec.finalize
    expect_subset:
      hash_algo: sha256_jcs_rfc8785
      spec:
        meta:
          maturity_level: L3

